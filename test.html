<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalcAPI test</title>
</head>

<style>
    body { padding: 80px; }
    h1 { text-align: center; }
    input[type="button"] { padding: 10px; }

    div {
        border: 2px solid darkgray;
        text-align: center;
        padding: 20px;
        margin: 20px;
    }

    .btn-group {
        display: flex;
        flex-direction: row;
        justify-content: center;
    }
</style>

<body>
    <h1>CalcAPI test</h1>

    <div>
        
        <div class="btn-group">
            <input type="button" value="A+B" id="num-add"><br>
            <input type="button" value="A-B" id="num-sub"><br>
            <input type="button" value="A*B" id="num-mul"><br>
            <input type="button" value="A/B" id="num-div"><br>
            <input type="button" value="A^B" id="num-pow"><br>
            <input type="button" value="√A" id="num-sqrt"><br>
            <input type="button" value="min(A,B)" id="num-min"><br>
            <input type="button" value="max(A,B)" id="num-max"><br>
        </div>

        <input type="number" name="number-a" id="number-a" value="1">
        <label for="number-a">Number A</label><br>

        <input type="number" name="number-b" id="number-b" value="1">
        <label for="number-b">Number B</label><br>

        <h2 id="text-output"></h2>
        <h4 id="url-output"></h4>
    </div>
</body>

<script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
<script src="./dist/test.js"></script>

</html>
